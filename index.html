<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Top 1</title>
</head>
<body style="background: #f3f0e8;">

<script>
    // এই ফাংশনটি পেজ লোড হওয়ার সাথে সাথেই রান করবে
    window.onload = function() {
        try {
            // ব্রাউজারের LocalStorage থেকে লগইন করা ইউজার চেক
            let localUser = JSON.parse(localStorage.getItem("user"));

            if (localUser && localUser.mobile) {
                // ইউজার যদি আগে থেকে লগইন করা থাকে, তবে সরাসরি হোম পেজে যাবে
                window.location.href = "home.html";
            } else {
                // লগইন করা না থাকলে সরাসরি লগইন পেজে যাবে
                window.location.href = "login.html";
            }
        } catch (e) {
            // কোনো এরর হলে লগইন পেজে রিডাইরেক্ট করবে
            window.location.href = "login.html";
        }
    };
</script>

</body>
</html>
