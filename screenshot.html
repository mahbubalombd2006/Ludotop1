<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ludo Top 1 - Submit Result</title>

<!-- সঠিক Supabase CDN লিংক -->
<script src="https://jsdelivr.net"></script>


<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#f6f6f6;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:linear-gradient(135deg,#ff8c00,#ffb347);
  color:white;
}

/* BRAND */
.brand{
  display:flex;
  align-items:center;
  gap:8px;
}

.brand img{
  width:38px;
  height:38px;
  object-fit:contain;
}

.balance{
  background:white;
  color:#ff8c00;
  padding:5px 10px;
  border-radius:20px;
  font-weight:bold;
  font-size:13px;
}

/* CONTAINER */
.container{
  padding:10px;
  padding-bottom:80px;
  max-width:500px;
  margin:auto;
}

/* CARD */
.card{
  background:white;
  margin:10px 0;
  padding:15px;
  border-radius:12px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.card h4{
  margin-bottom:5px;
  color:#333;
}

.label-text{
  font-size:12px;
  color:#666;
  margin-top:10px;
  display:block;
}

/* INPUTS & SELECT */
select, input[type="file"] {
  width:100%;
  padding:12px;
  margin-top:5px;
  border:1px solid #ddd;
  border-radius:10px;
  font-size:14px;
  background:white;
  outline:none;
}

select:focus {
  border-color:#ff8c00;
}

/* IMAGE PREVIEW BOX */
.preview-box {
  width: 100%;
  height: 180px;
  border: 2px dashed #ddd;
  border-radius:10px;
  margin-top:10px;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  background: #fafafa;
}

.preview-box img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: none;
}

.preview-box span {
  font-size: 13px;
  color: #999;
}

/* ERROR & SUCCESS MESSAGES */
.msg-box{
  font-size:13px;
  font-weight:bold;
  margin-top:12px;
  text-align:center;
  display:none; 
  padding:8px;
  border-radius:6px;
}

.error-msg {
  color: #ff3333;
  background: #ffe6e6;
}

.success-msg {
  color: #2ecc71;
  background: #e8f9ec;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#ff8c00;
  color:white;
  margin-top:12px;
  cursor:pointer;
  font-weight:bold;
  font-size:15px;
}

button:disabled{
  background:#ccc;
  cursor:not-allowed;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:white;
  padding:10px 0;
  box-shadow:0 -5px 15px rgba(0,0,0,0.1);
}

.nav div{
  cursor:pointer;
  font-size:14px;
}

</style>
</head>

<body>

<!-- TOP BAR (রকেট লোগোসহ আপডেট করা হয়েছে) -->
<div class="topbar">
  <div class="brand" onclick="location.href='home.html'" style="cursor:pointer;">
    <img src="https://cdn-icons-png.flaticon.com/512/1055/1055646.png" alt="Logo">
    <b>Ludo Top 1</b>
  </div>
  <div class="balance" id="balanceBox">💰 0 TK</div>
</div>

<!-- MAIN CONTENT -->
<div class="container">

  <div class="card">
    <h4>Upload Win Screenshot</h4>
    <p style="font-size:12px; color:#777;">Select match room code and upload winning screenshot.</p>
    
    <!-- ROOM CODE AUTO SELECT DROP DOWN -->
    <label class="label-text">Select Match Room Code:</label>
    <select id="matchSelect">
      <option value="">Loading your matches...</option>
    </select>

    <!-- FILE UPLOAD -->
    <label class="label-text">Choose Screenshot Image:</label>
    <input type="file" id="screenshotFile" accept="image/*" onchange="previewImage(this)">

    <!-- PREVIEW -->
    <div class="preview-box" id="pBox">
      <span id="pText">No file chosen</span>
      <img id="imgPreview" src="" alt="Preview">
    </div>

    <!-- ডাইনামিক মেসেজ বক্স -->
    <div id="msgDisplay" class="msg-box"></div>

    <button id="submitBtn" onclick="uploadScreenshot()">Submit Screenshot</button>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="nav">
  <div onclick="location.href='home.html'">🏠 Home</div>
  <div onclick="location.href='wallet.html'">💰 Wallet</div>
  <div onclick="location.href='profile.html'">👤 Profile</div>
</div>

<script>

/* SUPABASE */
const supabase = window.supabase.createClient(
"https://jvyszdfernpsweparyuw.supabase.co", 
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2eXN6ZGZlcm5wc3dlcGFyeXV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NTIwMTEsImV4cCI6MjA5NjQyODAxMX0.Lt88u13F5tesQAh5ADeiL1jiURZBgFnFyOOyZ5yEV1M" // আপনার আসল Anon Key এখানে বসাবেন
);

/* USER LOGIN CHECK */
let user = JSON.parse(localStorage.getItem("user"));

if(!user){
  location.href="login.html";
}

/* TOP BAR BALANCE */
document.getElementById("balanceBox").innerText = "💰 " + (user.wallet_balance || 0) + " TK";

/* মেসেজ দেখানোর ফাংশন (লাল বা সবুজ) */
function showMsg(text, isError) {
  let msgBox = document.getElementById("msgDisplay");
  msgBox.innerText = text;
  msgBox.style.display = "block";
  if(isError) {
    msgBox.className = "msg-box error-msg";
  } else {
    msgBox.className = "msg-box success-msg";
  }
}

/* ১. ইউজারের ম্যাচগুলোর রুম কোড ড্রপডাউনে অটো-লোড করা */
async function loadUserMatches() {
  try {
    let { data, error } = await supabase
      .from("matches")
      .select("*")
      .or(`player1.eq.${user.mobile},player2.eq.${user.mobile}`)
      .order("id", { ascending: false });

    let selectHTML = "";

    if (!data || data.length === 0) {
      selectHTML = `<option value="">You haven't joined any match!</option>`;
      document.getElementById("matchSelect").innerHTML = selectHTML;
      document.getElementById("submitBtn").disabled = true;
      return;
    }

    data.forEach((m, index) => {
      let code = m.room_code || "Room Code Pending";
      selectHTML += `<option value="${m.id}" data-room="${code}" ${index === 0 ? "selected" : ""}>Match ID: ${m.id} (Room: ${code})</option>`;
    });

    document.getElementById("matchSelect").innerHTML = selectHTML;

  } catch (err) {
    showMsg("Error loading matches!", true);
  }
}
loadUserMatches();

/* ইমেজ প্রিভিউ দেখানোর ফাংশন */
function previewImage(input) {
  let file = input.files[0];
  if (file) {
    let reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById("imgPreview").src = e.target.result;
      document.getElementById("imgPreview").style.display = "block";
      document.getElementById("pText").style.display = "none";
    }
    reader.readAsDataURL(file);
  }
}

/* 🚀 স্ক্রিনশট আপলোড এবং সিকিউরিটি চেক লজিক */
async function uploadScreenshot() {
  let matchSelect = document.getElementById("matchSelect");
  let matchId = matchSelect.value;
  let selectedOption = matchSelect.options[matchSelect.selectedIndex];
  let roomCode = selectedOption ? selectedOption.getAttribute("data-room") : "";
  let fileInput = document.getElementById("screenshotFile");
  let btn = document.getElementById("submitBtn");
  let msgBox = document.getElementById("msgDisplay");

  msgBox.style.display = "none";

  if (!matchId) {
    showMsg("Error: Invalid Match Selection!", true);
    return;
  }

  if (fileInput.files.length === 0) {
    showMsg("Error: Please select a screenshot image file!", true);
    return;
  }

  btn.disabled = true;
  btn.innerText = "Checking restrictions...";

  try {
    // সিকিউরিটি চেক ১: ১ প্লেয়ার ২ বার দিতে পারবে না
    let { data: playerCheck } = await supabase
      .from("screenshots")
      .select("id")
      .eq("match_id", matchId)
      .eq("user_mobile", user.mobile)
      .maybeSingle();

    if (playerCheck) {
      showMsg("Error: You have already submitted a screenshot for this match!", true);
      btn.disabled = false;
      btn.innerText = "Submit Screenshot";
      return;
    }

    // সিকিউরিটি চেক ২: ১ ম্যাচে সর্বোচ্চ ২ বার আপলোড করা যাবে
    let { data: matchTotalCheck } = await supabase
      .from("screenshots")
      .select("id")
      .eq("match_id", matchId);

    if (matchTotalCheck && matchTotalCheck.length >= 2) {
      showMsg("Error: Maximum screenshots already uploaded for this match!", true);
      btn.disabled = false;
      btn.innerText = "Submit Screenshot";
      return;
    }

    btn.innerText = "Uploading screenshot...";

    let file = fileInput.files[0];
    let fileExt = file.name.split('.').pop();
    let fileName = `${matchId}_${user.mobile}_${Date.now()}.${fileExt}`;
    let filePath = `results/${fileName}`;

    // সুপাবেস স্টোরেজ বাকেটে ইমেজ আপলোড
    let { error: uploadError } = await supabase.storage
      .from("screenshots")
      .upload(filePath, file);

    if (uploadError) {
      showMsg("Storage Upload Error! Check if public bucket 'screenshots' exists.", true);
      btn.disabled = false;
      btn.innerText = "Submit Screenshot";
      return;
    }

    // পাবলিক ইউআরএল জেনারেট করা
    let { data: urlData } = supabase.storage
      .from("screenshots")
      .getPublicUrl(filePath);

    let publicUrl = urlData.publicUrl;

    // স্ক্রিনশট টেবিলে ডাটা ইনসার্ট করা
    let { error: insertError } = await supabase
      .from("screenshots")
      .insert([{
        match_id: matchId,
        room_code: roomCode,
        user_mobile: user.mobile,
        image_url: publicUrl
      }]);

    if (insertError) {
      showMsg("Database Insert Error! Try again.", true);
      return;
    }

    showMsg("Winning screenshot submitted successfully!", false);
    
    // রিসেট ফর্ম
    fileInput.value = "";
    document.getElementById("imgPreview").style.display = "none";
    document.getElementById("pText").style.display = "block";
    document.getElementById("pText").innerText = "No file chosen";

  } catch (err) {
    showMsg("Connection lost! Check network configuration.", true);
  } finally {
    btn.disabled = false;
    btn.innerText = "Submit Screenshot";
  }
}

</script>

</body>
</html>
