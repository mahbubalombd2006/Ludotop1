<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ludo Top 1 - Premium Admin Panel</title>

<!-- সঠিক Supabase CDN লিংক যুক্ত করা হয়েছে -->
<script src="https://jsdelivr.net"></script>


<style>
/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', Arial, sans-serif;
}
body{
  background:#f6f8fa;
  padding:15px;
  color:#333;
}

/* TOP BAR SYSTEM CONTROL */
.header{
  background:linear-gradient(135deg,#ff8c00,#ffb347);
  color:white;
  padding:20px;
  border-radius:14px;
  text-align:center;
  margin-bottom:20px;
  box-shadow:0 4px 15px rgba(255,140,0,0.2);
}
.header h2 {
  font-size:24px;
  font-weight:700;
  letter-spacing:0.5px;
}

/* CONTAINER */
.admin-container {
  max-width:600px;
  margin:auto;
}

/* MODERN PREMIUM CARD */
.card{
  background:white;
  padding:20px;
  border-radius:14px;
  box-shadow:0 4px 15px rgba(0,0,0,0.04);
  margin-bottom:20px;
  border:1px solid #eaeaea;
}
h3{
  margin-bottom:15px;
  color:#222;
  font-size:16px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:8px;
}
h3::before {
  content:'';
  display:inline-block;
  width:4px;
  height:16px;
  background:#ff8c00;
  border-radius:10px;
}

/* FORM ELEMENTS */
label{
  font-size:12px;
  font-weight:600;
  color:#666;
  margin-top:10px;
  display:block;
}
input, select{
  width:100%;
  padding:12px;
  margin:6px 0 14px 0;
  border:1px solid #e0e0e0;
  border-radius:10px;
  font-size:14px;
  background:#fafafa;
  transition:all 0.3s ease;
  outline:none;
}
input:focus, select:focus{
  border-color:#ff8c00;
  background:#fff;
  box-shadow:0 0 0 3px rgba(255,140,0,0.1);
}

/* BUTTONS */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff8c00;
  color:white;
  cursor:pointer;
  font-weight:bold;
  font-size:14px;
  transition:all 0.2s ease;
}
button:hover{
  background:#e07b00;
  transform:translateY(-1px);
}

/* ACTION CONTROLS */
.actions {
  display:flex;
  gap:6px;
  align-items:center;
  width:100%;
  margin-top:10px;
}
.actions input {
  margin:0;
  padding:10px;
  flex:1;
}
.actions button {
  width:auto;
  padding:10px 15px;
}
button.btn-set { background:#ff8c00; }
button.danger{ background:#ff3333; }
button.danger:hover{ background:#d62828; }
button.success{ background:#2ecc71; }
button.success:hover{ background:#27ae60; }

/* LIST CARDS FOR DYNAMIC ROW */
.item-row{
  background:#fcfcfc;
  padding:15px;
  border-radius:12px;
  margin-top:12px;
  border:1px solid #eee;
  border-left:4px solid #ff8c00;
  display:flex;
  flex-direction:column;
  gap:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.01);
}
.item-info{
  font-size:13px;
  color:#444;
  line-height:1.6;
}

/* DEPOSIT ROW COLOR OVERRIDE */
.deposit-row { border-left-color:#2ecc71; }
.deposit-row .actions { justify-content:flex-end; }
.deposit-row button { flex:1; max-width:120px; }

/* SCREENSHOT VIEWLOOK */
.screenshot-row { border-left-color: #9b59b6; }
.screenshot-img-preview {
  width: 100%;
  max-height: 150px;
  object-fit: contain;
  border-radius: 8px;
  border: 1px dashed #ddd;
  margin-top: 5px;
  cursor: pointer;
  background: #fdfdfd;
}

.empty-text {
  text-align:center;
  font-size:13px;
  color:#999;
  padding:15px 0;
}
</style>
</head>
<body>

<div class="admin-container">

  <div class="header">
    <h2>Ludo Top 1 Control Panel</h2>
  </div>

  <!-- 1. WHATSAPP SETTING -->
  <div class="card">
    <h3>Update Support Settings</h3>
    <label>WhatsApp Number (With Country Code, e.g., 88017XXXXXXXX):</label>
    <input type="text" id="waNumInput" placeholder="8801744595338">
    <button onclick="updateSettings()">Save Settings</button>
  </div>

  <!-- 2. PAYMENT NUMBERS SETTING -->
  <div class="card">
    <h3>Update Payment Numbers</h3>
    <label>Admin bKash Number:</label>
    <input type="text" id="bkashNumInput" placeholder="017XXXXXXXX">
    
    <label>Admin Nagad Number:</label>
    <input type="text" id="nagadNumInput" placeholder="019XXXXXXXX">
    
    <button onclick="updatePaymentNumbers()" style="background: #2ecc71;">Save Payment Numbers</button>
  </div>

  <!-- 3. CREATE NEW MATCH -->
  <div class="card">
    <h3>Create New Match</h3>
    <label>Entry Fee (TK):</label>
    <input type="number" id="entryFee" placeholder="Enter Fee">
    
    <label>Prize Pool (TK):</label>
    <input type="number" id="prize" placeholder="Enter Prize">
    
    <label>Match Start Time:</label>
    <input type="text" id="startTime" placeholder="e.g., 09:30 PM">
    
    <label>Creator/Player 1 Mobile:</label>
    <input type="text" id="player1" value="Admin" placeholder="Player 1 Number">

    <button onclick="createMatch()">Publish Match</button>
  </div>

  <!-- 4. ACTIVE MATCHES LIST -->
  <div class="card">
    <h3>Active Matches & Room Codes</h3>
    <div id="adminMatchList" class="empty-text">Loading matches...</div>
  </div>

  <!-- 5. PENDING DEPOSITS -->
  <div class="card">
    <h3>Pending Deposit Requests</h3>
    <div id="adminDepositList" class="empty-text">Loading deposits...</div>
  </div>

  <!-- 6. SUBMITTED WIN SCREENSHOTS LIST -->
  <div class="card">
    <h3>Submitted Match Screenshots</h3>
    <div id="adminScreenshotList" class="empty-text">Loading screenshots...</div>
  </div>

</div>

<script>
/* SUPABASE CONNECT (সঠিক অরিজিনাল ইউআরএল সেট করা হয়েছে) */
const supabase = window.supabase.createClient(
  "https://jvyszdfernpsweparyuw.supabase.co", 
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp2eXN6ZGZlcm5wc3dlcGFyeXV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NTIwMTEsImV4cCI6MjA5NjQyODAxMX0.Lt88u13F5tesQAh5ADeiL1jiURZBgFnFyOOyZ5yEV1M" // আপনার আসল Anon Key এখানে বসাবেন
);

// ড্যাশবোর্ডের সমস্ত কারেন্ট সেটিংস লোড করা
async function loadCurrentSettings(){
  let { data } = await supabase.from("settings").select("*").limit(1).maybeSingle();
  if(data){
    if(data.whatsapp_number) document.getElementById("waNumInput").value = data.whatsapp_number;
    if(data.bkash_number) document.getElementById("bkashNumInput").value = data.bkash_number;
    if(data.nagad_number) document.getElementById("nagadNumInput").value = data.nagad_number;
  }
}
loadCurrentSettings();

// হোয়াটসএপ আপডেট করা
async function updateSettings(){
  let waNum = document.getElementById("waNumInput").value.trim();
  if(!waNum) return alert("Enter number");

  let { data: existing } = await supabase.from("settings").select("id").limit(1).maybeSingle();

  let error;
  if(existing){
    let res = await supabase.from("settings").update({ whatsapp_number: waNum }).eq("id", existing.id);
    error = res.error;
  } else {
    let res = await supabase.from("settings").insert([{ whatsapp_number: waNum }]);
    error = res.error;
  }

  if(!error) alert("WhatsApp support number updated successfully!");
  else alert("Error updating database!");
}

// পেমেন্ট নম্বর আপডেট করার ডাইনামিক ফাংশন
async function updatePaymentNumbers(){
  let bkashNum = document.getElementById("bkashNumInput").value.trim();
  let nagadNum = document.getElementById("nagadNumInput").value.trim();

  if(!bkashNum || !nagadNum) return alert("Please fill both bKash and Nagad fields!");

  let { data: existing } = await supabase.from("settings").select("id").limit(1).maybeSingle();

  let error;
  if(existing){
    let res = await supabase.from("settings").update({ bkash_number: bkashNum, nagad_number: nagadNum }).eq("id", existing.id);
    error = res.error;
  } else {
    let res = await supabase.from("settings").insert([{ bkash_number: bkashNum, nagad_number: nagadNum }]);
    error = res.error;
  }

  if(!error) alert("Payment numbers updated successfully!");
  else alert("Error updating payment numbers!");
}

// নতুন ম্যাচ তৈরি করা
async function createMatch(){
  let fee = document.getElementById("entryFee").value.trim();
  let prize = document.getElementById("prize").value.trim();
  let time = document.getElementById("startTime").value.trim();
  let p1 = document.getElementById("player1").value.trim();

  if(!fee || !prize || !time || !p1){
    alert("Please fill all fields!");
    return;
  }

  let { error } = await supabase.from("matches").insert([{
    entry_fee: Number(fee),
    prize: Number(prize),
    start_time: time,
    player1: p1,
    room_code: ""
  }]);

  if(!error){
    alert("New Match Created!");
    document.getElementById("entryFee").value = "";
    document.getElementById("prize").value = "";
    document.getElementById("startTime").value = "";
    loadAdminMatches();
  } else {
    alert("Failed to create match!");
  }
}

// ম্যাচগুলোর তালিকা লোড
async function loadAdminMatches(){
  let { data } = await supabase.from("matches").select("*").order("id", { ascending: false });
  let html = "";
  if(!data || data.length === 0){
    document.getElementById("adminMatchList").innerHTML = "<div class='empty-text'>No matches found.</div>";
    return;
  }

  data.forEach(m => {
    html += `
    <div class="item-row">
      <div class="item-info">
        <b>Match ID:</b> #${m.id} &nbsp;|&nbsp; <b>Fee:</b> ${m.entry_fee} TK &nbsp;|&nbsp; <b>Prize:</b> ${m.prize} TK<br>
        <b>Player 1:</b> ${m.player1} &nbsp;|&nbsp; <b>Player 2:</b> ${m.player2 || "Waiting..."}<br>
        <b>Time:</b> ${m.start_time} &nbsp;|&nbsp; <b>Room Code:</b> ${m.room_code || "Not Set"}
      </div>
      <div class="actions">
        <input type="text" id="code_${m.id}" value="${m.room_code || ''}" placeholder="Enter Room Code">
        <button class="btn-set" onclick="updateRoomCode(${m.id})">Set Code</button>
        <button class="danger" onclick="deleteMatch(${m.id})">Delete</button>
      </div>
    </div>
    `;
  });
  document.getElementById("adminMatchList").innerHTML = html;
}
loadAdminMatches();

async function updateRoomCode(id){
  let codeVal = document.getElementById("code_" + id).value.trim();
  let { error } = await supabase.from("matches").update({ room_code: codeVal }).eq("id", id);
  if(!error) {
    alert("Room Code Updated!");
    loadAdminMatches();
  } else {
    alert("Error updating room code");
  }
}

async function deleteMatch(id){
  if(confirm("Are you sure you want to permanently delete this match?")){let { error } = await supabase.from("matches").delete().eq("id", id);if(!error) {alert("Match removed successfully!");loadAdminMatches();} else {alert("Error deleting match!");}}}// পেন্ডিং ডিপোজিট রিকোয়েস্ট লোডasync function loadAdminDeposits(){let { data } = await supabase.from("transactions").select("*").eq("status", "pending").order("id", { ascending: true });let html = "";if(!data || data.length === 0){document.getElementById("adminDepositList").innerHTML = "No pending requests.";return;}data.forEach(t => {html += <div class="item-row deposit-row"> <div class="item-info"> <b>User Mobile:</b> ${t.user_mobile}<br> <b>Amount:</b> ${t.amount} TK &nbsp;|&nbsp; <b>TxID:</b> <span style="font-family: monospace; background: #eee; padding: 2px 6px; border-radius: 4px;">${t.txn_id}</span> </div> <div class="actions"> <button class="success" onclick="statusDeposit('${t.id}', '${t.user_mobile}', ${t.amount}, 'approved')">Approve</button> <button class="danger" onclick="statusDeposit('${t.id}', '${t.user_mobile}', ${t.amount}, 'rejected')">Reject</button> </div> </div>;});document.getElementById("adminDepositList").innerHTML = html;}loadAdminDeposits();async function statusDeposit(id, mobile, amount, newStatus){if(!confirm(Are you sure you want to ${newStatus} this request?)) return;if(newStatus === "approved"){let { data: userData } = await supabase.from("users").select("wallet_balance").eq("mobile", mobile).single();if(userData){let currentBal = userData.wallet_balance || 0;let updatedBal = currentBal + amount;await supabase.from("users").update({ wallet_balance: updatedBal }).eq("mobile", mobile);}}await supabase.from("transactions").update({ status: newStatus }).eq("id", id);alert(Deposit successfully ${newStatus}!);loadAdminDeposits();}// লাইভ প্লেয়ার উইন স্ক্রিনশট লোড করার সম্পূর্ণ নতুন ফাংশনasync function loadAdminScreenshots(){let { data } = await supabase.from("screenshots").select("*").order("id", { ascending: false });let html = "";if(!data || data.length === 0){document.getElementById("adminScreenshotList").innerHTML = "No win screenshots uploaded yet.";return;}data.forEach(s => {html += <div class="item-row screenshot-row"> <div class="item-info"> <b>Match ID:</b> #${s.match_id} &nbsp;|&nbsp; <b>Room Code:</b> ${s.room_code}<br> <b>Submitted By:</b> ${s.user_mobile} <br> <a href="${s.image_url}" target="_blank"> <img src="${s.image_url}" class="screenshot-img-preview" title="Click to view full size image"> </a> </div> <div class="actions" style="justify-content: flex-end;"> <button class="danger" style="padding:6px 12px; font-size:12px;" onclick="deleteScreenshot(${s.id})">Delete Log</button> </div> </div>;});document.getElementById("adminScreenshotList").innerHTML = html;}loadAdminScreenshots();async function deleteScreenshot(id){if(confirm("Are you sure you want to remove this screenshot record?")){let { error } = await supabase.from("screenshots").delete().eq("id", id);if(!error){alert("Screenshot log removed!");loadAdminScreenshots();} else {alert("Failed to delete record.");}}}
</script>
</body>
</html>
